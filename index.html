    <style>
        :root {

        body, html {
            margin: 0;

            height: 100%;
            font-family: 'Arial', sans-serif;
            background-color: var(--blanc);
            overflow: hidden;

        .slide {

            height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: fadeIn 1s;

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .active { display: flex; }

        /* PARTIE 1 */
        .border-sable {
            border: 5px solid var(--couleur-sable);
            padding: 40px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 4rem;
            text-transform: uppercase;
            margin: 0;
            color: var(--bleu-marine);
        }

        .logo-main { width: 500px; height: auto; }

        /* PARTIE 2 */
        .webcam-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .webcam-frame {
            width: 100%;
            height: 100%;
            border: none;
            /* Zoom et recadrage pour enlever les parties floues/menus */
            transform: scale(1.15);
            transform-origin: center center;
        }

        .title-overlay {
            position: absolute;
            top: 20px;
            background: var(--bleu-marine);
            color: white;
            padding: 10px 30px;
            border-radius: 50px;
            font-size: 2rem;
            z-index: 10;
        }

        /* PARTIE 3 */
        .title-meteo {
            background-color: var(--bleu-marine);
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            display: inline-block;
            font-size: 2.5rem;
            margin: 20px 0;
            text-transform: uppercase;
        }

        .content-container {
            display: flex;
            flex-direction: column;
            width: 95%;
            height: 90%;
            align-items: center;
        }

        .meteo-top { width: 100%; margin-bottom: 20px; }

        .meteo-bottom {
            display: flex;
            width: 100%;
            justify-content: space-around;
            align-items: center;
            margin-top: 20px;
        }

        .maree-box {
            border: 3px solid var(--couleur-sable);
            padding: 10px;
            background: white;
        }

        .partenaires {
            display: flex;
            justify-content: space-around;
            width: 70%;
            align-items: flex-end;
        }

        .partenaire-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .partenaire-item img {
            height: 120px;
            width: auto;
            margin-top: 10px;
        }

        .partenaire-title {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--bleu-marine);
        }
    </style>

    <script>
        let currentSlide = 1;
        const totalSlides = 3;
        
        function showSlide(n) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.getElementById('slide' + n).classList.add('active');
        }

        function runRotation() {
            // Slide 1 : 15 secondes
            showSlide(1);
            setTimeout(() => {
                // Slide 2 : 60 secondes
                showSlide(2);
                setTimeout(() => {
                    // Slide 3 : 45 secondes
                    showSlide(3);
                    setTimeout(() => {
                        runRotation(); // Recommence la boucle
                    }, 45000);
                }, 60000);
            }, 15000);
        }

        // Démarrage de la boucle aprčs chargement
        window.onload = runRotation;
    </script>
